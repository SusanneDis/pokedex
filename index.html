<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokedex</title>

  <script defer src="./scripts/template.js"></script>
  <script defer src="./script.js"></script>

  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./styles/standard.css" />
  <link rel="stylesheet" href="./styles/fonts.css" />
  <link rel="stylesheet" href="./styles/assets.css" />
  <link rel="stylesheet" href="./style.css" />

  <link rel="icon" type="image/png" href="./assets/icons/logos/pokemon-logo-color.png" />

</head>

<body onload="init()">

  <header>
    <div class="logo-div">
      <a href="#" onclick="returnToList()" class="center-logo" aria-label="back to pokemon list">
        <img src="./assets/icons/logos/pokemon-logo-color.png" class="poke-logo" onclick="returnToList()"
          alt="Logo Pokedex"></a>
      <div class="header-h1">
        <h1>Pokedex</h1>
      </div>
    </div>

    <form role="search" class="form-div" aria-labelledby="search-poke-label" onsubmit="searchPokemon(event)">
      <label id="search-poke-label" for="search-pokemon" class="visually-hidden">Search your Pokémon</label>
      <input id="search-pokemon" type="search" class="input-field" placeholder="Search your Pokémon">

      <button type="submit" class="search-btn">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="white">
          <path
            d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
        </svg>
      </button>
    </form>

    <nav aria-label="Pokemon Typ Filter">
      <ul class="type-div">
        <li><button aria-label="Bug" onclick="filterPokemonType('bug')">
            <img src="./assets/icons/pokemon-types/bug.svg" alt="Pokemon Typ Bug" title="Bug">
          </button></li>

        <li><button aria-label="Dark" onclick="filterPokemonType('dark')">
            <img src="./assets/icons/pokemon-types/dark.svg" alt="Pokemon Typ Dark" title="Dark">
          </button></li>

        <li><button aria-label="Dragon" onclick="filterPokemonType('dragon')">
            <img src="./assets/icons/pokemon-types/dragon.svg" alt="Pokemon Typ Dragon" title="Dragon">
          </button></li>

        <li><button aria-label="Electric" onclick="filterPokemonType('electric')">
            <img src="./assets/icons/pokemon-types/electric.svg" alt="Pokemon Typ Electric" title="Electric">
          </button></li>

        <li><button aria-label="Fairy" onclick="filterPokemonType('fairy')">
            <img src="./assets/icons/pokemon-types/fairy.svg" alt="Pokemon Typ Fairy" title="Fairy">
          </button></li>

        <li><button aria-label="Fighting" onclick="filterPokemonType('fighting')">
            <img src="./assets/icons/pokemon-types/fighting.svg" alt="Pokemon Typ Fighting" title="Fighting">
          </button></li>

        <li><button aria-label="Fire" onclick="filterPokemonType('fire')">
            <img src="./assets/icons/pokemon-types/fire.svg" alt="Pokemon Typ Fire" title="Fire">
          </button></li>

        <li><button aria-label="Flying" onclick="filterPokemonType('flying')">
            <img src="./assets/icons/pokemon-types/flying.svg" alt="Pokemon Typ Flying" title="Flying">
          </button></li>

        <li><button aria-label="Ghost" onclick="filterPokemonType('ghost')">
            <img src="./assets/icons/pokemon-types/ghost.svg" alt="Pokemon Typ Ghost" title="Ghost">
          </button></li>

        <li><button aria-label="Grass" onclick="filterPokemonType('grass')">
            <img src="./assets/icons/pokemon-types/grass.svg" alt="Pokemon Typ Grass" title="Grass">
          </button></li>

        <li><button aria-label="Ground" onclick="filterPokemonType('ground')">
            <img src="./assets/icons/pokemon-types/ground.svg" alt="Pokemon Typ Ground" title="Ground">
          </button></li>

        <li><button aria-label="Ice" onclick="filterPokemonType('ice')">
            <img src="./assets/icons/pokemon-types/ice.svg" alt="Pokemon Typ Ice" title="Ice">
          </button></li>

        <li><button aria-label="Normal" onclick="filterPokemonType('normal')">
            <img src="./assets/icons/pokemon-types/normal.svg" alt="Pokemon Typ Normal" title="Normal">
          </button></li>

        <li><button aria-label="Poison" onclick="filterPokemonType('poison')">
            <img src="./assets/icons/pokemon-types/poison.svg" alt="Pokemon Typ Poison" title="Poison">
          </button></li>

        <li><button aria-label="Psychic" onclick="filterPokemonType('psychic')">
            <img src="./assets/icons/pokemon-types/psychic.svg" alt="Pokemon Typ Psychic" title="Psychic">
          </button></li>

        <li><button aria-label="Rock" onclick="filterPokemonType('rock')">
            <img src="./assets/icons/pokemon-types/rock.svg" alt="Pokemon Typ Rock" title="Rock">
          </button></li>

        <li><button aria-label="Steel" onclick="filterPokemonType('steel')">
            <img src="./assets/icons/pokemon-types/steel.svg" alt="Pokemon Typ Steel" title="Steel">
          </button></li>

        <li><button aria-label="Water" onclick="filterPokemonType('water')">
            <img src="./assets/icons/pokemon-types/water.svg" alt="Pokemon Typ Water" title="Water">
          </button></li>
      </ul>
    </nav>
  </header>

  <main>

    <section aria-label="Loading Spinner">
      <div id="loading-spinner" role="status" aria-live="polite" class="hidden">
        <!-- status announces loading, polite means, read if there is time, no interruption-->
        <img src="./assets/icons/logos/pokemon-logo-color.png" alt="Loading Spinner">
      </div>
    </section>

    <section aria-label="pokémon cards">
      <ul id="pokecard-container" aria-live="polite"></ul>

      <div id="load-btn-div" class="load-btn-div d-none">
        <button id="load-btn" class="load-btn" onclick="loadMorePokemons()">Load more Pokémon</button>
        <p id="note"></p>
      </div>

      <div aria-label="Return Button" id="return-btn-div" class="return-btn-div d-none">
        <button id="return-btn" class="load-btn" onclick="returnToList()">Return</button>
        <p id="return-note" class="return-note"></p>
      </div>
    </section>

    <section aria-label="pokémon dialog">
      <dialog id="pokemon-dialog" aria-labelledby="dialog-title" onclick="this.close()">
        <div id="dialog-content" onclick="event.stopPropagation()">
        </div>
      </dialog>
    </section>

  </main>


  <footer></footer>

</body>

</html>
